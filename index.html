<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JINDE | 錦德工程管理中台</title>
    
    <script>
        (function() {
            if (localStorage.getItem('jinde_verified') !== 'true') {
                window.location.replace('login.html');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --sidebar-bg: #1a222d;
            --brand-teal: #0d9488;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 側邊欄與導航統一 */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 50; 
        }
        .nav-link { 
            padding: 14px 24px; 
            font-size: 14px; 
            color: #94a3b8; 
            transition: all 0.2s ease; 
            border-left: 4px solid transparent; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            white-space: nowrap;
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { 
            background: #242e3d; 
            color: white; 
            border-left-color: var(--brand-teal); 
        }

        /* 主舞台區 */
        .main-stage { flex-grow: 1; display: flex; flex-direction: column; background: #fdfdfd; overflow: hidden; }
        .top-header { height: 70px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: white; flex-shrink: 0; }
        .content-scroll { padding: 40px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }

        /* 功能卡片統一 */
        .action-card { 
            background: white; 
            border: 1px solid #f1f5f9; 
            padding: 28px; 
            border-radius: 32px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            gap: 16px;
        }
        .action-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            border-color: var(--brand-teal); 
        }
        .action-card:active { transform: scale(0.95); }

        .icon-box { 
            width: 56px; height: 56px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; 
        }

        /* 響應式：手機版側欄縮減 */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar .nav-text, .sidebar h1, .sidebar p { display: none; }
            .nav-link { justify-content: center; padding: 22px 0; }
            .nav-link i { margin: 0 !important; font-size: 20px; }
            .top-header { padding: 0 20px; }
            .content-scroll { padding: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter">JINDE<span class="text-teal-500">.</span></h1>
            <p id="user-display" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">Admin Hub</p>
        </div>
        
        <nav class="flex-grow">
            <a href="index.html" class="nav-link active"><i class="fas fa-th-large mr-3 w-5"></i><span class="nav-text">中台總覽</span></a>
            <a href="customer.html" class="nav-link"><i class="far fa-address-book mr-3 w-5"></i><span class="nav-text">客戶管理</span></a>
            <a href="project.html" class="nav-link"><i class="fas fa-hammer mr-3 w-5"></i><span class="nav-text">案場管理</span></a>
            <a href="staff.html" class="nav-link"><i class="fas fa-users-cog mr-3 w-5"></i><span class="nav-text">人員核算</span></a>
            <a href="quote_query.html" class="nav-link"><i class="fas fa-search-dollar mr-3 w-5"></i><span class="nav-text">報價查詢</span></a>
            <a href="finance.html" class="nav-link"><i class="fas fa-chart-line mr-3 w-5"></i><span class="nav-text">財務中心</span></a>
        </nav>

        <div class="p-6 border-t border-slate-800/50 mt-auto">
            <div class="flex items-center gap-2 mb-1">
                <span id="status-dot" class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Cloud System Online</span>
            </div>
            <div class="text-[9px] text-slate-600 font-mono">
                SECURE IDLE: <span id="logout-timer">30:00</span>
            </div>
        </div>
    </aside>

    <main class="main-stage">
        <header class="top-header">
            <div class="flex items-center gap-3">
                <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>
                <h2 class="text-sm font-black text-slate-800 tracking-[0.2em] uppercase">錦德管理總覽</h2>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-right hidden sm:block border-r border-slate-100 pr-6">
                    <p id="live-date" class="text-[10px] font-black text-slate-300 uppercase tracking-widest"></p>
                    <p id="live-time" class="text-lg font-black text-slate-800 font-mono"></p>
                </div>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition active:scale-90 flex items-center justify-center shadow-sm">
                    <i class="fas fa-power-off text-lg"></i>
                </button>
            </div>
        </header>

        <div class="content-scroll">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
                
                <div class="col-span-1 sm:col-span-2 bg-slate-900 rounded-[40px] p-10 text-white flex justify-between items-center relative overflow-hidden group cursor-pointer shadow-2xl shadow-slate-900/20" onclick="location.href='project.html'">
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-2.5 h-2.5 bg-teal-400 rounded-full animate-ping"></span>
                            <span class="text-teal-400 text-xs font-black uppercase tracking-widest">Active Jobs</span>
                        </div>
                        <h3 class="text-3xl font-black mb-2 tracking-tight">今日施工案場</h3>
                        <p class="text-slate-400 text-sm font-medium">點擊進入案場進度監控系統</p>
                    </div>
                    <i class="fas fa-hard-hat text-9xl text-white/5 absolute -right-6 -bottom-6 group-hover:scale-125 group-hover:text-teal-500/10 transition duration-700"></i>
                </div>

                <div class="action-card" onclick="location.href='customer.html'">
                    <div class="icon-box bg-blue-50 text-blue-600"><i class="far fa-address-book"></i></div>
                    <div>
                        <h3 class="font-black text-slate-800 text-lg">客戶管理</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium">業主聯繫與通訊錄架構</p>
                    </div>
                </div>

                <div class="action-card" onclick="location.href='staff.html'">
                    <div class="icon-box bg-indigo-50 text-indigo-600"><i class="fas fa-user-clock"></i></div>
                    <div>
                        <h3 class="font-black text-slate-800 text-lg">人員核算</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium">師傅點工與薪資統計</p>
                    </div>
                </div>

                <div class="action-card" onclick="location.href='quote_query.html'">
                    <div class="icon-box bg-emerald-50 text-emerald-600"><i class="fas fa-search-dollar"></i></div>
                    <div>
                        <h3 class="font-black text-slate-800 text-lg">歷史報價</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium">過往工程單價快速檢索</p>
                    </div>
                </div>

                <div class="action-card" onclick="location.href='warranty_content.html'">
                    <div class="icon-box bg-purple-50 text-purple-600"><i class="fas fa-certificate"></i></div>
                    <div>
                        <h3 class="font-black text-slate-800 text-lg">保固證明</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium">自動生成完工保固單據</p>
                    </div>
                </div>

                <div class="action-card bg-slate-900 border-none shadow-xl shadow-slate-900/10" onclick="location.href='finance.html'">
                    <div class="icon-box bg-white/10 text-teal-400"><i class="fas fa-chart-line"></i></div>
                    <div>
                        <h3 class="font-black text-white text-lg">財務中心</h3>
                        <p class="text-xs text-slate-500 mt-1 font-medium italic">案場損益分析報表</p>
                    </div>
                </div>

            </div>
        </div>

        <footer class="px-10 py-6 border-t border-slate-50 flex justify-between items-center bg-white">
            <span class="text-[10px] text-slate-300 font-black uppercase tracking-[0.5em]">JINDE Engineering Cloud Management v4.6</span>
            <div class="flex gap-4 text-[10px] font-bold text-slate-400">
                <span class="hover:text-teal-600 cursor-pointer transition">Support</span>
                <span class="hover:text-teal-600 cursor-pointer transition">Docs</span>
            </div>
        </footer>
    </main>

    <script>
        // --- 核心變數 ---
        let idleTime = 1800; // 30 分鐘
        const initialIdle = 1800;

        // --- 時鐘更新 ---
        function updateLiveTime() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        // --- 登出機制 ---
        function logout() {
            if(!confirm('確定要安全登出系統？')) return;
            localStorage.clear();
            window.location.replace('login.html');
        }

        // --- 活動監測與自動登出 ---
        function resetTimer() {
            idleTime = initialIdle;
        }

        function startIdleMonitor() {
            // 滑鼠、鍵盤、觸控都會重置時間
            window.onload = resetTimer;
            window.onmousemove = resetTimer;
            window.onmousedown = resetTimer;
            window.ontouchstart = resetTimer;
            window.onclick = resetTimer;
            window.onkeypress = resetTimer;

            setInterval(() => {
                idleTime--;
                const m = Math.floor(idleTime / 60);
                const s = idleTime % 60;
                const display = document.getElementById('logout-timer');
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;

                if (idleTime < 300) display.classList.add('text-rose-500', 'font-black');
                else display.classList.remove('text-rose-500', 'font-black');

                if (idleTime <= 0) {
                    localStorage.clear();
                    window.location.replace('login.html');
                }
            }, 1000);
        }

        // --- 初始化 ---
        window.addEventListener('DOMContentLoaded', () => {
            updateLiveTime();
            setInterval(updateLiveTime, 1000);
            startIdleMonitor();
            
            // 讀取使用者名稱
            const user = localStorage.getItem('user_name') || '錦德管理員';
            document.getElementById('user-display').innerText = user;
        });
    </script>
</body>
</html>
