<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINDE | 錦德工程管理中台</title>
    
    <script>
        (function() {
            const isVerified = localStorage.getItem('jinde_verified');
            const loginTimestamp = localStorage.getItem('jinde_login_timestamp');
            const ninetyDaysMs = 90 * 24 * 60 * 60 * 1000;
            const now = Date.now();

            // 若未驗證，直接踢回登入頁
            if (isVerified !== 'true') {
                window.location.replace('login.html');
                return;
            }

            // 檢查 90 天效期
            if (loginTimestamp) {
                if (now - parseInt(loginTimestamp) > ninetyDaysMs) {
                    localStorage.clear();
                    alert('【登入逾期】安全性考量，請重新登入驗證。');
                    window.location.replace('login.html');
                }
            } else {
                localStorage.clear();
                window.location.replace('login.html');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root { --sidebar-bg: #1a222d; --brand-teal: #0d9488; }
        body { background-color: #f8fafc; font-family: 'Inter', 'Noto Sans TC', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
        .nav-link { padding: 14px 24px; font-size: 14px; color: #94a3b8; transition: all 0.2s ease; border-left: 4px solid transparent; cursor: pointer; display: flex; align-items: center; }
        .nav-link:hover, .nav-link.active { background: #242e3d; color: white; border-left-color: var(--brand-teal); }

        .main-stage { flex-grow: 1; display: flex; flex-direction: column; background: #fdfdfd; overflow: hidden; }
        .top-header { height: 70px; border-bottom: 1px solid #edf2f7; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: white; }
        .content-scroll { padding: 30px; overflow-y: auto; flex-grow: 1; }

        .action-card { background: white; border: 1px solid #f1f5f9; padding: 24px; border-radius: 28px; transition: all 0.3s; cursor: pointer; display: flex; flex-direction: column; gap: 14px; }
        .action-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); border-color: var(--brand-teal); }
        .icon-circle { width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        .cron-tag { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter italic">JINDE<span class="text-teal-500">.</span></h1>
            <p id="user-name-display" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">錦德工程行</p>
        </div>
        
        <nav class="flex-grow">
            <a href="index.html" class="nav-link active"><i class="fas fa-th-large mr-3 w-5"></i><span>中台總覽</span></a>
            <a href="customer.html" class="nav-link"><i class="far fa-address-book mr-3 w-5"></i><span>客戶管理</span></a>
            <a href="project.html" class="nav-link"><i class="fas fa-hammer mr-3 w-5"></i><span>案場進度</span></a>
            <a href="staff.html" class="nav-link"><i class="fas fa-users-cog mr-3 w-5"></i><span>人員審核</span></a>
            <a href="quote.html" class="nav-link"><i class="fas fa-file-invoice-dollar mr-3 w-5"></i><span>報價系統</span></a>
        </nav>

        <div class="p-6 border-t border-slate-800/50">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">System Active</span>
                </div>
                <span class="cron-tag">CRON OK</span>
            </div>
            <div class="space-y-1">
                <div class="text-[9px] text-slate-600 font-mono flex justify-between">
                    <span>DB MAINTAIN:</span>
                    <span class="text-slate-400">01:00 AM</span>
                </div>
                <div class="text-[9px] text-slate-600 font-mono flex justify-between">
                    <span>SECURE LOGOUT:</span>
                    <span id="logout-timer" class="text-teal-600 font-bold">30:00</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-stage">
        <header class="top-header">
            <div class="flex items-center gap-2">
                <span class="w-1 h-4 bg-teal-500 rounded-full"></span>
                <h2 class="text-sm font-black text-slate-800 tracking-widest uppercase">Management Hub</h2>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="live-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter"></p>
                    <p id="live-time" class="text-sm font-black text-slate-800 font-mono"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-rose-600 transition border border-slate-100">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="content-scroll">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                
                <div class="col-span-2 bg-slate-900 rounded-[32px] p-8 text-white relative overflow-hidden group">
                    <div class="relative z-10">
                        <h3 class="text-2xl font-black mb-1">您好，<span id="welcome-name">管理員</span></h3>
                        <p class="text-slate-400 text-xs">歡迎回到錦德工程管理雲端中台</p>
                    </div>
                    <i class="fas fa-cloud text-8xl text-white/5 absolute -right-4 -bottom-4"></i>
                </div>

                <div class="action-card" onclick="location.href='customer.html'">
                    <div class="icon-circle bg-blue-50 text-blue-600"><i class="far fa-address-book"></i></div>
                    <h3 class="font-black text-sm text-slate-800">客戶管理</h3>
                </div>

                <div class="action-card" onclick="location.href='project.html'">
                    <div class="icon-circle bg-orange-50 text-orange-600"><i class="fas fa-hard-hat"></i></div>
                    <h3 class="font-black text-sm text-slate-800">案場進度</h3>
                </div>

                <div class="action-card" onclick="location.href='staff.html'">
                    <div class="icon-circle bg-indigo-50 text-indigo-600"><i class="fas fa-user-check"></i></div>
                    <h3 class="font-black text-sm text-slate-800">人員審核</h3>
                </div>

                <div class="action-card" onclick="location.href='quote.html'">
                    <div class="icon-circle bg-emerald-50 text-emerald-600"><i class="fas fa-file-invoice-dollar"></i></div>
                    <h3 class="font-black text-sm text-slate-800">報價系統</h3>
                </div>

                <div class="action-card" onclick="location.href='staff_payroll.html'">
                    <div class="icon-circle bg-teal-100 text-teal-600"><i class="fas fa-calculator"></i></div>
                    <h3 class="font-black text-sm text-slate-700">薪資核算</h3>
                </div>
                
                </div>
        </div>

        <footer class="p-6 border-t border-slate-100 flex justify-between items-center bg-white text-[9px] text-slate-300 font-black uppercase tracking-[0.4em]">
            <span>JINDE ENGINEERING CLOUD V4.6.5</span>
            <span>DB MAINTAIN SUCCESSFUL</span>
        </footer>
    </main>

    <script>
        // 顯示登入名稱
        const userName = localStorage.getItem('user_name') || '管理員';
        document.getElementById('welcome-name').innerText = userName;
        document.getElementById('user-name-display').innerText = `錦德工程行 - ${userName}`;

        // 系統時間與登出計時
        let timeLeft = 1800; // 30分鐘
        function updateUI() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' });
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-TW', { hour12:false });
            
            if (timeLeft <= 0) logout();
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('logout-timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function logout() {
            localStorage.clear();
            window.location.replace('login.html');
        }

        setInterval(updateUI, 1000);
        window.onload = updateUI;
    </script>
</body>
</html>
