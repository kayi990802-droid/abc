<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINDE | 登入系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: white; border-radius: 24px; width: 100%; max-width: 360px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .input-group input { width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }
        .hidden-view { display: none; }
        .loading-spinner { border: 2px solid #ccc; border-top: 2px solid #333; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        // 【權限檢查：總一入口邏輯】
        // 如果已經登入過，直接送進 index.html，不給看登入頁
        if (localStorage.getItem('jinde_verified') === 'true') {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>

    <div id="login-panel" class="glass-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic italic">JINDE<span class="text-teal-500">.</span></h1>
            <p class="text-[10px] font-bold text-slate-400 tracking-[3px] uppercase">工程管理系統入口</p>
        </div>
        
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <div class="input-group">
                <label class="text-[10px] font-bold text-slate-400 ml-1">帳號 EMAIL</label>
                <input type="email" id="u_email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group relative">
                <label class="text-[10px] font-bold text-slate-400 ml-1">密碼</label>
                <input type="password" id="u_pw" placeholder="••••••••" required>
            </div>
            <button type="submit" id="l_btn" class="w-full py-3 bg-slate-900 text-white font-bold rounded-xl active:scale-95 transition mt-2">進入系統</button>
            <div class="text-center"><button type="button" onclick="switchView('reg')" class="text-xs text-slate-400 underline">申請帳號權限</button></div>
            <p id="l_msg" class="text-center text-xs font-bold mt-2"></p>
        </form>
    </div>

    <div id="reg-panel" class="glass-card hidden-view">
        <h2 class="text-xl font-bold text-center mb-6">申請加入成員</h2>
        <form onsubmit="handleRegister(event)" class="space-y-4">
            <input type="text" id="r_name" placeholder="姓名" class="w-full p-3 bg-slate-50 rounded-xl border" required>
            <input type="email" id="r_email" placeholder="Email" class="w-full p-3 bg-slate-50 rounded-xl border" required>
            <input type="password" id="r_pw" placeholder="密碼 (6位以上)" class="w-full p-3 bg-slate-50 rounded-xl border" required>
            <button type="submit" id="r_btn" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl active:scale-95 transition">提交申請</button>
            <div class="text-center"><button type="button" onclick="switchView('login')" class="text-xs text-slate-400 underline">返回登入</button></div>
            <p id="r_msg" class="text-center text-xs font-bold mt-2"></p>
        </form>
    </div>

    <script>
        const S_URL = 'https://wdpxgichzvfebhlukbrl.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcHhnaWNoenZmZWJobHVrYnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjExMzQsImV4cCI6MjA4NDU5NzEzNH0.--85I0A-7WKt0P-ex1Zdnb8UVspuMNshzQtNaLedKq0';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function switchView(v) {
            document.getElementById('login-panel').classList.toggle('hidden-view', v === 'reg');
            document.getElementById('reg-panel').classList.toggle('hidden-view', v === 'login');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('l_btn');
            const msg = document.getElementById('l_msg');
            btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> 驗證中...';

            const { data, error } = await _supabase.from('staff')
                .select('*')
                .eq('email', document.getElementById('u_email').value)
                .eq('password', document.getElementById('u_pw').value)
                .maybeSingle();

            if (data) {
                if (data.status === 'active') {
                    localStorage.setItem('jinde_verified', 'true');
                    localStorage.setItem('user_name', data.name);
                    window.location.replace('index.html');
                } else {
                    msg.innerText = "⚠️ 帳號審核中，請聯繫林老闆";
                    msg.className = "text-center text-xs text-orange-500 font-bold mt-2";
                    btn.disabled = false; btn.innerText = "進入系統";
                }
            } else {
                msg.innerText = "❌ 帳號或密碼錯誤";
                msg.className = "text-center text-xs text-rose-500 font-bold mt-2";
                btn.disabled = false; btn.innerText = "進入系統";
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('r_btn');
            btn.disabled = true;
            const { error } = await _supabase.from('staff').insert([{
                name: document.getElementById('r_name').value,
                email: document.getElementById('r_email').value,
                password: document.getElementById('r_pw').value,
                status: 'pending'
            }]);
            if (!error) {
                alert("申請成功，請等待老闆核准");
                switchView('login');
            } else {
                alert("申請失敗，Email 可能重複");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
