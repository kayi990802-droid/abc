<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JINDE | 案場管理中台</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 【核心安全性檢查 - 統一邏輯】
        (function() {
            const MAX_IDLE_TIME = 30 * 60 * 1000; 
            const lastActive = localStorage.getItem('jinde_last_active');
            const now = Date.now();

            if (localStorage.getItem('jinde_verified') !== 'true') {
                window.location.replace('login.html');
            } else if (lastActive && (now - lastActive > MAX_IDLE_TIME)) {
                localStorage.clear();
                window.location.replace('login.html');
            }
            localStorage.setItem('jinde_last_active', now);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root { --brand-teal: #0d9488; --sidebar-bg: #1a222d; }
        
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 統一側邊欄 */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); color: white;
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link {
            padding: 14px 24px; font-size: 14px; color: #94a3b8;
            transition: 0.2s; border-left: 4px solid transparent;
            display: flex; align-items: center; text-decoration: none;
        }
        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.05); color: white; border-left-color: var(--brand-teal);
        }

        /* 主舞台區 */
        .main-stage { flex-grow: 1; display: flex; flex-direction: column; background: #fdfdfd; overflow: hidden; }
        .top-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .content-scroll { padding: 32px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }

        /* 案場卡片樣式 */
        .project-card { 
            background: white; border-radius: 32px; border: 1px solid #f1f5f9; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden; height: 220px;
        }
        .project-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); 
            border-color: var(--brand-teal); 
        }

        /* Modal 遮罩 */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; padding: 20px;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar .nav-text, .sidebar h1, .sidebar p { display: none; }
            .nav-link { justify-content: center; padding: 22px 0; }
            .nav-link i { margin: 0; font-size: 18px; }
            .top-header { padding: 0 20px; }
            .content-scroll { padding: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter cursor-pointer text-white" onclick="location.href='index.html'">JINDE<span class="text-teal-500">.</span></h1>
            <p id="user-display" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">Admin Hub</p>
        </div>
        <nav class="flex-grow">
            <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i><span class="nav-text font-bold">中台總覽</span></a>
            <a href="customer.html" class="nav-link"><i class="far fa-address-book"></i><span class="nav-text font-bold">客戶管理</span></a>
            <a href="project.html" class="nav-link active"><i class="fas fa-hammer"></i><span class="nav-text font-bold">案場管理</span></a>
            <a href="staff.html" class="nav-link"><i class="fas fa-users-cog"></i><span class="nav-text font-bold">人員核算</span></a>
            <a href="finance.html" class="nav-link"><i class="fas fa-chart-line"></i><span class="nav-text font-bold">財務中心</span></a>
        </nav>
        <div class="p-6 border-t border-white/5">
            <div class="flex items-center gap-2 mb-3">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span></span>
                <span class="text-[9px] text-slate-500 font-black uppercase tracking-tighter">Database Linked</span>
            </div>
            <button onclick="logout()" class="text-[10px] font-bold text-slate-500 hover:text-rose-400 transition flex items-center gap-2">
                <i class="fas fa-power-off"></i> <span class="nav-text uppercase">Secure Logout</span>
            </button>
        </div>
    </aside>

    <main class="main-stage">
        <header class="top-header">
            <div class="flex items-center gap-4 flex-grow max-w-xl">
                <div class="relative w-full group">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input type="text" id="searchInput" oninput="fetchProjects()" placeholder="搜尋案場名稱或編號..." class="w-full bg-slate-50 border-none rounded-2xl px-11 py-3 text-sm outline-none focus:ring-2 focus:ring-teal-500/20 transition-all">
                </div>
            </div>
            <button onclick="openModal()" class="ml-4 bg-slate-900 text-white px-6 py-3 rounded-2xl text-[11px] font-black transition hover:bg-teal-600 active:scale-95 flex items-center gap-2 shadow-lg shadow-slate-900/10">
                <i class="fas fa-plus-circle"></i> <span class="hidden md:inline uppercase tracking-widest">Create Project</span>
            </button>
        </header>

        <section class="content-scroll">
            <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
                <div class="animate-pulse bg-white rounded-[32px] h-52 border border-slate-100"></div>
                <div class="animate-pulse bg-white rounded-[32px] h-52 border border-slate-100"></div>
            </div>
            
            <div id="empty-state" class="hidden text-center py-40">
                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-folder-open text-slate-200 text-4xl"></i>
                </div>
                <h3 class="text-slate-400 font-black uppercase tracking-widest text-xs">No Projects Found</h3>
            </div>
        </section>
    </main>

    <div id="projectModal" class="modal" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-md rounded-[40px] p-10 shadow-2xl transform transition-all scale-100">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 tracking-tighter">建立案場檔案<span class="text-teal-500">.</span></h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Project Initialization</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-500 transition"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">案場全名</label>
                    <input type="text" id="p_name" placeholder="例如：大里區王公館防水工程" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-teal-500/20 font-bold mt-2">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">上傳附件 (圖面/報價單 PDF)</label>
                    <input type="file" id="p_file" accept=".pdf" class="block w-full text-xs text-slate-500 mt-2 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:bg-slate-900 file:text-white file:font-black hover:file:bg-teal-600 transition cursor-pointer">
                </div>
                <div class="pt-4">
                    <button id="saveBtn" onclick="saveProject()" class="w-full py-5 bg-teal-600 text-white rounded-[24px] font-black text-lg shadow-xl shadow-teal-500/20 hover:bg-teal-500 active:scale-95 transition-all duration-300">確認並發布案場</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://wdpxgichzvfebhlukbrl.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcHhnaWNoenZmZWJobHVrYnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjExMzQsImV4cCI6MjA4NDU5NzEzNH0.--85I0A-7WKt0P-ex1Zdnb8UVspuMNshzQtNaLedKq0';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function resetIdle() { localStorage.setItem('jinde_last_active', Date.now()); }
        window.onmousemove = resetIdle;

        async function fetchProjects() {
            const search = document.getElementById('searchInput').value;
            const grid = document.getElementById('projectGrid');
            const empty = document.getElementById('empty-state');

            let query = _supabase.from('projects').select('*').order('created_at', { ascending: false });
            if (search) query = query.ilike('name', `%${search}%`);

            const { data, error } = await query;
            if (error || !data || data.length === 0) {
                grid.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = data.map(p => `
                <div class="project-card p-8">
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="bg-teal-50 text-teal-600 text-[9px] font-black px-2 py-1 rounded-lg uppercase tracking-wider">${p.project_no || 'PJ-NEW'}</span>
                            <span class="text-[9px] text-slate-300 font-mono">${new Date(p.created_at).toLocaleDateString()}</span>
                        </div>
                        <h3 class="font-black text-slate-800 text-lg leading-snug line-clamp-2 mt-2">${p.name}</h3>
                    </div>
                    
                    <div class="flex items-center justify-between pt-6 mt-4 border-t border-slate-50">
                        <div class="flex gap-2">
                            ${p.file_url ? `
                                <a href="${p.file_url}" target="_blank" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-teal-500 shadow-xl shadow-slate-900/10 transition-all active:scale-90">
                                    <i class="fas fa-file-pdf"></i>
                                </a>` : `
                                <div class="w-10 h-10 bg-slate-50 text-slate-200 rounded-xl flex items-center justify-center border border-dashed border-slate-200">
                                    <i class="fas fa-ghost text-xs"></i>
                                </div>`}
                        </div>
                        <button onclick="deleteProject('${p.id}')" class="w-10 h-10 text-slate-200 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all active:scale-90 flex items-center justify-center">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function saveProject() {
            const name = document.getElementById('p_name').value;
            const fileInput = document.getElementById('p_file');
            const saveBtn = document.getElementById('saveBtn');

            if (!name) return alert("請輸入案場名稱");
            if (fileInput.files.length > 0 && fileInput.files[0].size > 5 * 1024 * 1024) return alert("檔案過大（上限 5MB）");

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> 上傳中...';

            let fileUrl = null;
            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await _supabase.storage.from('project-files').upload(fileName, file);
                    if (error) throw error;
                    fileUrl = _supabase.storage.from('project-files').getPublicUrl(fileName).data.publicUrl;
                }

                const { error: insErr } = await _supabase.from('projects').insert([{
                    name,
                    project_no: "PJ-" + Math.floor(100000 + Math.random() * 900000),
                    file_url: fileUrl
                }]);
                if (insErr) throw insErr;

                closeModal();
                document.getElementById('p_name').value = "";
                document.getElementById('p_file').value = "";
                fetchProjects();
            } catch (err) {
                alert("存檔失敗：" + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "確認並發布案場";
            }
        }

        async function deleteProject(id) {
            if (!confirm("確定刪除此案場？此動作無法復原。")) return;
            const { error } = await _supabase.from('projects').delete().eq('id', id);
            if (error) alert("刪除失敗"); else fetchProjects();
        }

        function logout() { localStorage.clear(); window.location.replace('login.html'); }
        function openModal() { document.getElementById('projectModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('projectModal').style.display = 'none'; }

        window.onload = () => {
            document.getElementById('user-display').innerText = localStorage.getItem('user_name') || '管理員';
            fetchProjects();
        };
    </script>
</body>
</html>
